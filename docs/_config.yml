# GitHub Pages 설정
title: FreeLang v4 - AI-First 프로그래밍 언어
description: 완전한 구현, 성능 중심, 확장성 높은 프로그래밍 언어
author: Kim Jin Dol
email: contact@freelang.dev

# 테마 설정
theme: jekyll-theme-minimal

# 기본 설정
markdown: kramdown
highlighter: rouge

# 플러그인
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

# SEO 설정
lang: ko-KR
locale: ko_KR

# 빌드 설정
exclude:
  - .gitignore
  - README.md
  - LICENSE
  - node_modules
  - EXPERIENCE.md
  - V1_V2_V3_ANALYSIS.md

# 출력 설정
output: web
future: false
show_downloads: true
